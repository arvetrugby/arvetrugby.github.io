<html lang="es">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        .menu-toggle {
    font-size: 24px;        
    color: lemonchiffon;
}

.menu-toggle:hover {
   
    transform: scale(1.05);  /* Crece un poco */
}
        /* ===== LOGO PORTADA ===== */

        .logo-portada {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            position: relative;
        }

        #equipoLogo {
            width: 250px;
            height: 250px;
            object-fit: contain;
            opacity: 0;
            /* Agregamos will-change para optimizar la animación */
            will-change: transform, opacity;
            transition: opacity .3s ease;
            /* Posicionamos el logo para poder moverlo */
            position: relative;
        }

        #equipoLogo.loaded {
            opacity: 1;
        }

        /* ===== NAVBAR LOGOS ===== */

        #navbarLogoArvet {
            top: 60%;
            left: -8px;
            height: 85px;
            width: auto;
            opacity: 1;
            transition: opacity .35s ease;
        }

        /* logo equipo navbar */

        #navbarLogoEquipo {
            position: absolute;
            left: 0;
            top: 85%;
            transform: translateY(-70%);
            height: 65px;
            width: auto;
            opacity: 0;
            transition: opacity .35s ease;
        }

        /* estados */

        #navbarLogoArvet.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #navbarLogoEquipo.visible {
            opacity: 1;
        }

        /* ===== LOADER ===== */

        .logo-loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 0, 0, 0.08);
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: absolute;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ===== MOBILE MENU ===== */

        @media (max-width:768px) {
            .menu-toggle {
                display: block;
                z-index: 1001;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: 0;
                width: 100%;
                background: #00000099;
                flex-direction: column;
                align-items: center;
                gap: 22px;
                padding: 35px 0;
                transform: translateY(-120%);
                opacity: 0;
                transition: transform .35s ease, opacity .35s ease;
                z-index: 1000;
            }

            .nav-links.open {
                transform: translateY(0);
                opacity: 1;
            }

            .nav-links a {
                font-size: 18px;
                color: #fff;
                font-weight: 600;
                text-decoration: none;
            }
        }

        /* ===== OVERLAY ===== */

        #menuOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s ease;
            z-index: 900;
        }

        #menuOverlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        #unirseContainer{

    position: fixed;

    right: 30px;

/* botón */

#btnUnirse{

/* hover */

        .gridGaleriaMapa{

    display:grid;

    grid-template-columns: 2fr 1fr;

    gap:40px;

    align-items:start;

}

/* mapa */

#map{

    width:100%;

    height:420px;

    border-radius:14px;

}
        @media (max-width:1024px){

.gridGaleriaMapa{

grid-template-columns:1fr;

#map{

height:220px;

        .bloqueMapa{

background:white;

padding:20px;

border-radius:14px;

box-shadow:0 8px 24px rgba(0,0,0,0.08);

/* ============================================
   SECCIÓN: QUIÉNES SOMOS - LIMPIO Y ORDENADO

#quienesSomosContent {

/* Cada bloque de info */

/* Labels (Fundación, Instagram, etc) */

/* Links */

/* Responsive */

/* Cerrar al hacer click */

/* Asegurar que controles de Leaflet queden abajo */

}

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
    <script>
        /* ===== ELEMENTOS ===== */
        const equipoLogo = document.getElementById("equipoLogo");
        const navbarLogoEquipo = document.getElementById("navbarLogoEquipo");
        const navbarLogoArvet = document.getElementById("navbarLogoArvet");
        const logoLoader = document.getElementById("logoLoader");

        /* ===== CUANDO CARGA EL LOGO ===== */
        equipoLogo.addEventListener("load", () => {
            logoLoader.classList.add("hidden");
            equipoLogo.classList.add("loaded");
            navbarLogoEquipo.classList.add("loaded");
            /* copiar logo al navbar */
            navbarLogoEquipo.src = equipoLogo.src;
        });

        /* ===== SCROLL NAVBAR CON TRASLACIÓN ===== */
        window.addEventListener("scroll", () => {
            const scroll = window.scrollY;
            
            /* cambiar logos navbar */
            if (scroll > 220) {
                navbarLogoArvet.classList.add("hidden");
                navbarLogoEquipo.classList.add("visible");
            } else {
                navbarLogoArvet.classList.remove("hidden");
                navbarLogoEquipo.classList.remove("visible");
            }

            /* animación logo portada: escala + traslación hacia arriba-izquierda */
            const maxScroll = 400; // Distancia total de la animación
            let progress = scroll / maxScroll;
            if (progress > 1) progress = 1;
            if (progress < 0) progress = 0;

            // Escala de 1 a 0.25
            const scale = 1 - (progress * 0.75);
            
            // Traslación hacia arriba y izquierda (45 grados aprox)
            // Ajustá estos valores según la distancia exacta a tu navbar
            const translateX = -progress * 45; // Mueve 45vw hacia la izquierda (ajustable)
            const translateY = -progress * 30; // Mueve hacia arriba (ajustable)
            
            // Aplicamos transform combinado
            equipoLogo.style.transform = `translate(${translateX}vw, ${translateY}vh) scale(${scale})`;
            
            // Opacidad gradual (opcional, para que desaparezca suavemente)
            equipoLogo.style.opacity = 1 - (progress * 0.3);
        });

        /* ===== MENU MOBILE ===== */
        const menuToggle = document.getElementById("menuToggle");
        const navLinks = document.querySelector(".nav-links");
        const overlay = document.getElementById("menuOverlay");

        menuToggle.addEventListener("click", () => {
            navLinks.classList.toggle("open");
            overlay.classList.toggle("active");
        });

        /* cerrar al tocar link */
        document.querySelectorAll(".nav-links a").forEach(link => {
            link.addEventListener("click", () => {
                navLinks.classList.remove("open");
                overlay.classList.remove("active");
            });
        });

        /* cerrar tocando overlay */
        overlay.addEventListener("click", () => {
            navLinks.classList.remove("open");
            overlay.classList.remove("active");
        });
    </script>

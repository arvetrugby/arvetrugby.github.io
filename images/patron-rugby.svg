<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">

<rect width="800" height="400" fill="#0b2a5b"/>

<!-- líneas de fondo (touch lines) -->
<line x1="0" y1="40" x2="800" y2="40" stroke="#2e5fb3" stroke-width="2" stroke-opacity="0.25"/>
<line x1="0" y1="360" x2="800" y2="360" stroke="#2e5fb3" stroke-width="2" stroke-opacity="0.25"/>

<!-- línea central -->
<line x1="400" y1="40" x2="400" y2="360" stroke="#2e5fb3" stroke-width="2" stroke-opacity="0.35"/>

<!-- líneas de 22 -->
<line x1="200" y1="40" x2="200" y2="360" stroke="#2e5fb3" stroke-width="2" stroke-opacity="0.25"/>
<line x1="600" y1="40" x2="600" y2="360" stroke="#2e5fb3" stroke-width="2" stroke-opacity="0.25"/>

<!-- líneas de 10m -->
<line x1="320" y1="40" x2="320" y2="360"
stroke="#2e5fb3"
stroke-width="1.5"
stroke-opacity="0.2"
stroke-dasharray="8 8"/>

<line x1="480" y1="40" x2="480" y2="360"
stroke="#2e5fb3"
stroke-width="1.5"
stroke-opacity="0.2"
stroke-dasharray="8 8"/>

<!-- marcas de scrum -->
<circle cx="400" cy="200" r="6" fill="#2e5fb3" opacity="0.35"/>

</svg>

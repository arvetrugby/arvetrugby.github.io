```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Perfil - ARVET</title>

<link rel="stylesheet" href="css/styles.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Montserrat;
background:#f1f5f9;
margin:0;
}

/* HEADER EQUIPO */

.player-header{
padding:35px 20px;
color:white;
text-align:center;
background:var(--equipo-color,#6366f1);
}

.player-header img{
width:90px;
height:90px;
object-fit:contain;
margin-bottom:10px;
}

.player-header h1{
margin:0;
font-size:20px;
}

.player-header p{
margin:5px 0 0 0;
opacity:.9;
}

/* MAIN */

.main{
max-width:800px;
margin:auto;
padding:20px;
}

/* CARDS */

.card{
background:white;
padding:25px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

/* PERFIL */

.avatar{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #e2e8f0;
}

/* BOTONES */

button{
padding:10px 18px;
border-radius:8px;
border:none;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:var(--equipo-color,#6366f1);
color:white;
}

.btn-secondary{
background:#e2e8f0;
}

/* INPUTS */

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #cbd5e1;
margin-bottom:12px;
}

/* ESTADO */

.estado-box{
padding:12px;
border-radius:8px;
background:#f1f5f9;
font-weight:600;
text-align:center;
margin-bottom:15px;
}

</style>

</head>

<body>

<!-- HEADER DINÁMICO DEL EQUIPO -->

<div class="player-header">

<img id="equipoLogo" src="">

<h1 id="nombreEquipo">Equipo</h1>

<p>Panel del jugador</p>

</div>

<div class="main">

<button id="btnVolverAdmin" class="btn-secondary" style="display:none;">← Volver al Admin</button>
<button id="btnLogout" class="btn-secondary">Cerrar sesión</button>

<div id="mensajePerfil" style="display:none;"></div>

<div class="estado-box">
Estado: <span id="estadoJugador">Cargando...</span>
</div>

<!-- FOTO PERFIL -->

<div class="card" style="text-align:center">

<h3>Mi foto</h3>

<img id="avatarPreview" class="avatar" src="">

<br><br>

<input type="file" id="inputAvatar" accept="image/*" style="display:none;">

<button type="button" id="btnCambiarAvatar" class="btn-primary">
Cambiar foto
</button>

</div>

<!-- DOCUMENTOS -->

<div class="card">

<h3>Documentación obligatoria</h3>

<label>Apto Médico</label>
<input type="file" id="aptoMedico" accept=".pdf,image/*">
<div id="aptoLink"></div>

<label>Estudios realizados</label>
<input type="file" id="estudios" accept=".pdf,image/*">
<div id="estudiosLink"></div>

<label>Deslinde de responsabilidad</label>
<input type="file" id="deslinde" accept=".pdf,image/*">
<div id="deslindeLink"></div>

<br>

<button type="button" id="btnSubirDocumentos" class="btn-primary">
Subir documentación
</button>

</div>

<!-- DATOS PERSONALES -->

<div class="card">

<h3>Datos personales</h3>

<form id="formPerfil">

<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="apellido" placeholder="Apellido">
<input type="email" id="email" placeholder="Email">
<input type="text" id="telefono" placeholder="Teléfono">
<input type="date" id="fechaNacimiento">
<input type="text" id="dni" placeholder="DNI">
<input type="text" id="cuitCuil" placeholder="CUIT/CUIL">

<button type="submit" class="btn-primary">
Guardar cambios
</button>

</form>

</div>

<!-- CONTRASEÑA -->

<div class="card">

<h3>Cambiar contraseña</h3>

<input type="password" id="nuevaPassword" placeholder="Nueva contraseña">

<button type="button" id="btnCambiarPass" class="btn-primary">
Actualizar contraseña
</button>

</div>

</div>

<script src="js/app.js"></script>
<script src="js/panel-jugador.js"></script>

</body>
</html>
```

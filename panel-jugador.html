<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Perfil - ARVET</title>

<link rel="stylesheet" href="css/styles.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Montserrat;
background:#f1f5f9;
margin:0;
padding-top:0 !important;
}

/* HEADER EQUIPO */
.player-header{
padding:28px 20px;
color:white;

background:linear-gradient(
170deg,
var(--equipo-color,#6366f1) 0%,
transparent 100%
);
}
.player-header-content{
max-width:900px;
margin:auto;
display:flex;
align-items:center;
gap:18px;
}

.player-header-logo img{
width:90px;
height:90px;
object-fit:contain;
border-radius:12px;
padding:6px;
}

.player-header-info h1{
margin:0;
font-size:22px;
font-weight:700;
}

.player-header-info p{
margin:4px 0 0 0;
opacity:.9;
font-size:14px;
}

/* MAIN */

.main{
max-width:800px;
margin:auto;
padding:20px;
}

/* CARDS */

.card{
background:white;
padding:25px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

/* PERFIL */

.avatar{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #e2e8f0;
}

/* BOTONES */

button{
padding:10px 18px;
border-radius:8px;
border:none;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:var(--equipo-color,#6366f1);
color:white;
}

.btn-secondary{
background:#e2e8f0;
}

/* INPUTS */

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #cbd5e1;
margin-bottom:12px;
}


</style>

</head>

<body>

<!-- HEADER DINÁMICO DEL EQUIPO -->

<div class="player-header">

<div class="player-header-content">

<div class="player-header-logo">
<img id="equipoLogo" src="" alt="Logo equipo">
</div>

<div class="player-header-info">
<h1 id="nombreEquipo">Equipo</h1>
<p id="nombreJugador">Panel del jugador</p>
</div>

</div>

</div>


<div class="main">

<button id="btnVolverAdmin" class="btn-primary" style="display:none;">
← Volver al Admin
</button>

<button id="btnLogout" class="btn-primary">
Cerrar sesión
</button>

<div id="mensajePerfil" style="display:none;"></div>



<!-- FOTO PERFIL -->

<div class="card" style="text-align:center">

<h3>Mi foto</h3>

<img id="avatarPreview"
class="avatar"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
alt="Foto de perfil">

<br><br>

<input type="file"
id="inputAvatar"
accept="image/*"
style="display:none;">

<button type="button"
id="btnCambiarAvatar"
class="btn-primary">
Cambiar foto
</button>

</div>


<!-- DATOS PERSONALES -->

<div class="card">

<h3>Datos personales</h3>

<form id="formPerfil">

<input type="text"
id="nombre"
placeholder="Nombre"
autocomplete="given-name"
required>

<input type="text"
id="apellido"
placeholder="Apellido"
autocomplete="family-name"
required>

<input type="email"
id="email"
placeholder="Email"
autocomplete="email"
required>

<input type="text"
id="telefono"
placeholder="Teléfono"
autocomplete="tel">

<input type="date"
id="fechaNacimiento">

<input type="text"
id="dni"
placeholder="DNI">

<input type="text"
id="cuitCuil"
placeholder="CUIT/CUIL">

<button type="submit" class="btn-primary">
Guardar cambios
</button>

</form>

</div>


<!-- CONTRASEÑA -->

<div class="card">

<h3>Cambiar contraseña</h3>

<input type="password"
id="nuevaPassword"
placeholder="Nueva contraseña"
autocomplete="new-password">

<button type="button"
id="btnCambiarPass"
class="btn-primary">
Actualizar contraseña
</button>

</div>

</div>


<script src="js/app.js"></script>
<script src="js/panel-jugador.js"></script>

</body>
</html>

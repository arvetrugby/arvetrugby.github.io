<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyer Evento</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --gold: #d4af37;
    --gold-light: #f4e5c2;
    --dark-overlay: rgba(0, 20, 10, 0.4);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: #0a0f0a;
    color: white;
    line-height: 1.6;
  }

  /* FLYER SECTION - Pantalla completa */
  .flyer-hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Background Image - Siempre completa */
  .flyer-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .flyer-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    filter: brightness(0.7) contrast(1.1);
  }

  /* Overlay sutil para legibilidad */
  .flyer-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    background: linear-gradient(
      to bottom,
      rgba(0, 20, 10, 0.3) 0%,
      rgba(0, 20, 10, 0.1) 40%,
      rgba(0, 20, 10, 0.4) 70%,
      rgba(0, 20, 10, 0.85) 100%
    );
  }

  /* Content sobre la imagen */
  .flyer-content {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 40px 60px;
    justify-content: space-between;
  }

  /* HEADER - Logo y Nombre */
  .flyer-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
  }

  .logo-container {
    width: 100px;
    height: 100px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid rgba(255, 255, 255, 0.3);
    overflow: hidden;
    flex-shrink: 0;
  }

  .logo-container img {
    width: 80%;
    height: 80%;
    object-fit: contain;
  }

  .event-title-group {
    text-align: left;
  }

  .event-subtitle {
    font-size: 0.9rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.8);
    margin-bottom: 5px;
    font-weight: 300;
  }

  .event-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    background: linear-gradient(135deg, #fff 0%, var(--gold-light) 50%, #fff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
    line-height: 1.1;
  }

  /* CENTER INFO - Fechas */
  .flyer-center {
    text-align: center;
    margin: auto 0;
  }

  .date-range {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 600;
    color: white;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .date-range .gold-accent {
    color: var(--gold-light);
    font-weight: 700;
  }

  .time-info {
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    font-weight: 300;
    letter-spacing: 3px;
    color: rgba(255, 255, 255, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
  }

  .time-info::before,
  .time-info::after {
    content: '';
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* BOTTOM INFO - Lugar y detalles */
  .flyer-bottom {
    text-align: center;
    margin-bottom: 20px;
  }

  .location-main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: clamp(1.1rem, 2vw, 1.4rem);
    font-weight: 500;
    margin-bottom: 20px;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
  }

  .location-icon {
    width: 24px;
    height: 24px;
    color: var(--gold);
  }

  /* Tags container */
  .flyer-tags {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .tag {
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 8px 20px;
    border-radius: 30px;
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .tag.cupo {
    border-color: var(--gold);
    color: var(--gold-light);
    font-weight: 600;
  }

  .tag.tipo {
    background: rgba(212, 175, 55, 0.15);
    border-color: var(--gold);
    color: white;
  }

  /* INFO SECTION - Fuera de la imagen */
  .info-section {
    background: #0f1410;
    padding: 60px 20px;
  }

  .info-container {
    max-width: 800px;
    margin: 0 auto;
  }

  .section-block {
    margin-bottom: 40px;
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .description-text {
    font-size: 1.1rem;
    line-height: 1.8;
    color: rgba(255, 255, 255, 0.85);
    font-weight: 300;
  }

  /* Pricing fuera de imagen */
  .pricing-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
  }

  .price-card {
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(0, 0, 0, 0.3));
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 12px;
    padding: 25px;
    text-align: center;
    transition: all 0.3s ease;
  }

  .price-card:hover {
    transform: translateY(-5px);
    border-color: var(--gold);
    box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
  }

  .price-amount {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold-light);
    margin-bottom: 5px;
  }

  .price-label {
    font-size: 0.9rem;
    color: rgba(255, 255, 255, 0.6);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .price-desc {
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.4);
    margin-top: 8px;
  }

  /* Footer */
  .flyer-footer {
    background: #0a0f0a;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    padding: 30px 20px;
    text-align: center;
  }

  .creator-info {
    font-size: 0.9rem;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 2px;
  }

  .coordinates {
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.3);
    margin-top: 10px;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    .flyer-content {
      padding: 30px 20px;
    }

    .flyer-header {
      flex-direction: column;
      gap: 20px;
      margin-top: 10px;
    }

    .event-title-group {
      text-align: center;
    }

    .logo-container {
      width: 80px;
      height: 80px;
    }

    .time-info::before,
    .time-info::after {
      width: 30px;
    }

    .flyer-tags {
      gap: 10px;
    }

    .tag {
      padding: 6px 15px;
      font-size: 0.75rem;
    }

    .info-section {
      padding: 40px 20px;
    }
  }

  /* Loading */
  .loading {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0f0a;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    letter-spacing: 3px;
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading">CARGANDO EVENTO...</div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const encuentroId = params.get('id');

  // Función para formatear fechas
  function formatDateRange(fechasJSON) {
    let fechas = [];
    try { fechas = JSON.parse(fechasJSON); } catch(e) {}
    
    if (fechas.length === 0) return 'FECHA POR CONFIRMAR';
    
    // Extraer días únicos
    const dias = fechas.map(f => f.dia);
    const diasUnicos = [...new Set(dias)];
    
    if (diasUnicos.length === 1) {
      return diasUnicos[0].toUpperCase();
    } else {
      // Formato: 25, 26 Y 27 DE ENERO
      const diasFormateados = diasUnicos.map((d, i) => {
        // Extraer solo el número del día asumiendo formato "25 de Enero"
        const numero = d.match(/\d+/);
        return numero ? numero[0] : d;
      });
      
      if (diasFormateados.length === 2) {
        return `${diasFormateados[0]} Y ${diasFormateados[1]}`.toUpperCase();
      } else {
        const ultimo = diasFormateados.pop();
        return `${diasFormateados.join(', ')} Y ${ultimo}`.toUpperCase();
      }
    }
  }

  function getHoraInicio(fechasJSON) {
    let fechas = [];
    try { fechas = JSON.parse(fechasJSON); } catch(e) {}
    
    if (fechas.length > 0 && fechas[0].horarios.length > 0) {
      return fechas[0].horarios[0].hora;
    }
    return '';
  }

  if (!encuentroId) {
    document.getElementById('app').innerHTML = '<div class="loading">ERROR: ID NO ENCONTRADO</div>';
  } else {
    const API_URL = "https://script.google.com/macros/s/AKfycbxE-UiI85pCcUYq5LqJjN7UU7aOtXsVV_7Hyag-hYgOT4LcjGhVQaDt6js9PEQQ6E9Z/exec";
    
    fetch(`${API_URL}?action=getEncuentroById&id=${encuentroId}`)
      .then(res => res.json())
      .then(res => {
        if (!res.success || !res.data) throw new Error('Not found');
        
        const enc = res.data;
        const fechaDisplay = formatDateRange(enc.fechasJSON);
        const horaDisplay = getHoraInicio(enc.fechasJSON);
        
        // Parsear tipos (puede ser array o string separado por comas)
        const tipos = enc.tipo ? enc.tipo.split(',').map(t => t.trim()) : ['EVENTO'];
        
        // Parsear precios
        let precios = [];
        try { precios = JSON.parse(enc.valoresJSON); } catch(e) {}

        document.getElementById('app').innerHTML = `
          <!-- FLYER HERO -->
          <section class="flyer-hero">
            <div class="flyer-bg">
              <img src="${enc.flyerUrl}" alt="Flyer" onerror="this.src='https://images.unsplash.com/photo-1489944440615-453fc2b6a9a9?w=1920&q=80'">
            </div>
            <div class="flyer-overlay"></div>
            
            <div class="flyer-content">
              <!-- Header: Logo + Nombre -->
              <div class="flyer-header">
                <div class="logo-container">
                  <img src="https://i.ibb.co/mdk8g0L/ARVET.png" alt="Logo" id="event-logo">
                </div>
                <div class="event-title-group">
                  <div class="event-subtitle">Encuentro de Veteranos</div>
                  <h1 class="event-name">${enc.nombre}</h1>
                </div>
              </div>
              
              <!-- Center: Fechas -->
              <div class="flyer-center">
                <div class="date-range">${fechaDisplay}</div>
                ${horaDisplay ? `<div class="time-info">${horaDisplay} HS</div>` : ''}
              </div>
              
              <!-- Bottom: Lugar y Tags -->
              <div class="flyer-bottom">
                <div class="location-main">
                  <svg class="location-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                  </svg>
                  ${enc.lugar || 'Lugar por confirmar'}
                </div>
                
                <div class="flyer-tags">
                  ${enc.cupoMaximo ? `<span class="tag cupo">${enc.cupoMaximo} Equipos</span>` : ''}
                  ${tipos.map(t => `<span class="tag tipo">${t}</span>`).join('')}
                </div>
              </div>
            </div>
          </section>

          <!-- INFO SECTION (fuera de imagen) -->
          <section class="info-section">
            <div class="info-container">
              ${enc.descripcion ? `
              <div class="section-block">
                <h3 class="section-title">Sobre el Evento</h3>
                <p class="description-text">${enc.descripcion}</p>
              </div>
              ` : ''}
              
              ${precios.length > 0 ? `
              <div class="section-block">
                <h3 class="section-title">Inversión</h3>
                <div class="pricing-grid">
                  ${precios.map(p => `
                    <div class="price-card">
                      <div class="price-amount">$${parseFloat(p.precio).toLocaleString('es-AR')}</div>
                      <div class="price-label">${p.titulo}</div>
                      ${p.desc ? `<div class="price-desc">${p.desc}</div>` : ''}
                    </div>
                  `).join('')}
                </div>
              </div>
              ` : ''}
            </div>
          </section>

          <!-- FOOTER -->
          <footer class="flyer-footer">
            <div class="creator-info">ORGANIZA: ${enc.creadorNombre || 'Organizador'}</div>
            <div class="coordinates">${enc.lat}, ${enc.lng}</div>
          </footer>
        `;
      })
      .catch(err => {
        document.getElementById('app').innerHTML = '<div class="loading">EVENTO NO ENCONTRADO</div>';
      });
  }
</script>

</body>
</html>

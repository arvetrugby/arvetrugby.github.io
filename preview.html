<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyer Evento Rugby</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@300;400;500;600;700&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap');
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --gold: #c9a227;
    --gold-light: #f4d03f;
    --gold-dark: #8b6914;
    --blue-dark: #0a1628;
    --blue-mid: #1a3a5c;
  }

  body {
    font-family: 'Barlow Condensed', sans-serif;
    background: #050505;
    color: white;
    overflow-x: hidden;
  }

  /* CONTENEDOR PRINCIPAL */
  .flyer-wrapper {
    width: 100%;
    min-height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* SECCION HERO - Imagen de fondo completa */
  .hero-section {
    position: relative;
    width: 100%;
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Background */
  .hero-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .hero-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.6) contrast(1.1);
  }

  /* Overlay gradiente */
  .hero-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    background: 
      radial-gradient(ellipse at center top, transparent 0%, rgba(5,5,10,0.4) 50%, rgba(5,5,10,0.9) 100%),
      linear-gradient(to bottom, rgba(10,22,40,0.3) 0%, transparent 30%, transparent 60%, rgba(10,22,40,0.95) 100%);
  }

  /* BORDES DORADOS CURVOS (efecto ARVET) */
  .gold-border {
    position: absolute;
    z-index: 2;
    pointer-events: none;
  }

  .gold-border.top {
    top: -50px;
    left: -50px;
    right: -50px;
    height: 200px;
    border-bottom: 3px solid var(--gold);
    border-radius: 0 0 50% 50%;
    box-shadow: 0 10px 40px rgba(201, 162, 39, 0.3);
    background: linear-gradient(to bottom, rgba(10,22,40,0.8), transparent);
  }

  .gold-border.bottom {
    bottom: -50px;
    left: -50px;
    right: -50px;
    height: 200px;
    border-top: 3px solid var(--gold);
    border-radius: 50% 50% 0 0;
    box-shadow: 0 -10px 40px rgba(201, 162, 39, 0.3);
    background: linear-gradient(to top, rgba(10,22,40,0.9), transparent);
  }

  /* CONTENIDO SOBRE IMAGEN */
  .hero-content {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 40px;
    justify-content: space-between;
  }

  /* HEADER: Logo + Nombre + Edición */
  .hero-header {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
  }

  .logo-container {
    flex-shrink: 0;
  }

  .logo-container img {
    height: clamp(100px, 15vw, 180px);
    width: auto;
    filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
  }

  .title-group {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding-top: 10px;
  }

  .edicion-tag {
    font-family: 'Teko', sans-serif;
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    font-weight: 400;
    letter-spacing: 8px;
    color: var(--gold-light);
    text-transform: uppercase;
    margin-bottom: 5px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  }

  .event-name {
    font-family: 'Teko', sans-serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 600;
    line-height: 0.95;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: white;
    text-shadow: 0 4px 20px rgba(0,0,0,0.8);
  }

  /* CENTER: Fechas grandes */
  .hero-center {
    text-align: center;
    margin: auto 0;
  }
/* Fechas - Desktop */
.date-range-desktop {
  display: block;
}

.date-range-mobile {
  display: none;
}

/* Fechas - Mobile */
@media (max-width: 768px) {
  .date-range-desktop {
    display: none;
  }
  
  .date-range-mobile {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  
  .date-detail-item {
    background: rgba(10, 22, 40, 0.7);
    border: 1px solid var(--gold-dark);
    border-radius: 10px;
    padding: 15px 25px;
    backdrop-filter: blur(10px);
  }
  
  .date-day {
    display: block;
    font-family: 'Teko', sans-serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: white;
    letter-spacing: 2px;
  }
  
  .date-time {
    display: block;
    font-size: 0.95rem;
    color: var(--gold-light);
    letter-spacing: 1px;
    margin-top: 3px;
  }
}
  .date-main {
    font-family: 'Teko', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 700;
    line-height: 1;
    color: white;
    text-shadow: 0 4px 30px rgba(0,0,0,0.9);
    letter-spacing: 2px;
  }

  .date-main .gold {
    color: var(--gold-light);
    font-weight: 600;
  }

  .year-sub {
    font-family: 'Teko', sans-serif;
    font-size: clamp(1.5rem, 3vw, 2.5rem);
    font-weight: 300;
    letter-spacing: 15px;
    color: var(--gold);
    margin-top: 10px;
    text-transform: uppercase;
  }

  /* BOTTOM: Lugar + Tags */
  .hero-bottom {
    text-align: center;
    margin-bottom: 30px;
  }

  .location-box {
    display: inline-block;
    background: rgba(10, 22, 40, 0.8);
    border: 1px solid var(--gold-dark);
    border-radius: 50px;
    padding: 15px 40px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
  }

  .location-text {
    font-family: 'Teko', sans-serif;
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    font-weight: 500;
    letter-spacing: 3px;
    color: white;
  }

  .tags-row {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'Teko', sans-serif;
    font-size: clamp(0.9rem, 1.5vw, 1.1rem);
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 8px 20px;
    background: rgba(201, 162, 39, 0.15);
    border: 1px solid var(--gold-dark);
    color: var(--gold-light);
  }

  .tag.cupo {
    background: rgba(10, 22, 40, 0.9);
    border-color: var(--gold);
    color: white;
  }

  /* INFO SECTION (fuera de imagen) */
  .info-section {
    background: linear-gradient(to bottom, #0a1628, #050505);
    padding: 60px 20px;
    position: relative;
  }

  .info-container {
    max-width: 900px;
    margin: 0 auto;
  }

  .info-block {
    margin-bottom: 50px;
  }

  .info-title {
    font-family: 'Teko', sans-serif;
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .info-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--gold-dark), transparent);
  }

  .description-text {
    font-size: 1.1rem;
    line-height: 1.8;
    color: rgba(255, 255, 255, 0.85);
    font-weight: 300;
  }

  /* Pricing cards */
  .pricing-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .price-item {
    background: linear-gradient(135deg, rgba(201, 162, 39, 0.1), rgba(10, 22, 40, 0.5));
    border: 1px solid var(--gold-dark);
    border-radius: 12px;
    padding: 30px 40px;
    text-align: center;
    min-width: 200px;
    transition: all 0.3s ease;
  }

  .price-item:hover {
    transform: translateY(-5px);
    border-color: var(--gold);
    box-shadow: 0 10px 30px rgba(201, 162, 39, 0.2);
  }

  .price-value {
    font-family: 'Teko', sans-serif;
    font-size: 2.5rem;
    font-weight: 600;
    color: var(--gold-light);
    line-height: 1;
  }

  .price-name {
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255, 255, 255, 0.6);
    margin-top: 8px;
  }

  /* Footer */
  .footer-section {
    background: #050505;
    border-top: 1px solid rgba(201, 162, 39, 0.2);
    padding: 30px 20px;
    text-align: center;
  }

  .org-info {
    font-size: 0.9rem;
    letter-spacing: 3px;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
  }

  /* MOBILE: Logo arriba, nombre abajo */
  @media (max-width: 768px) {
    .hero-content {
      padding: 30px 20px;
    }

    .hero-header {
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .logo-container img {
      height: 140px;
    }

    .title-group {
      align-items: center;
      text-align: center;
    }

    .edicion-tag {
      letter-spacing: 4px;
    }

    .year-sub {
      letter-spacing: 8px;
    }

    .location-box {
      padding: 12px 25px;
      width: 100%;
      max-width: 400px;
    }

    .gold-border.top,
    .gold-border.bottom {
      display: none; /* En mobile simplificamos los bordes curvos */
    }
  }

  /* PC: Logo al lado, bordes curvos visibles */
  @media (min-width: 769px) {
    .hero-header {
      flex-direction: row;
      align-items: flex-start;
    }
  }

  /* Loading */
  .loading {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a1628;
    color: var(--gold);
    font-family: 'Teko', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 5px;
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading">CARGANDO EVENTO...</div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const encuentroId = params.get('id');

  // Extraer año del nombre o usar fecha
  function extractYear(nombre, fechaStr) {
    // Buscar año en el nombre (ej: "Encuentro 2027")
    const matchNombre = nombre.match(/\b(20\d{2})\b/);
    if (matchNombre) return matchNombre[1];
    
    // Buscar en fechas
    const matchFecha = fechaStr.match(/\b(20\d{2})\b/);
    if (matchFecha) return matchFecha[1];
    
    return new Date().getFullYear();
  }

  // Reemplazá la función formatDates por esta:

function formatDates(fechasJSON) {
  let fechas = [];
  try { fechas = JSON.parse(fechasJSON); } catch(e) {}
  
  if (fechas.length === 0) return { 
    rango: 'FECHA POR CONFIRMAR', 
    year: '',
    detalles: []
  };
  
  const meses = ['ENERO', 'FEBRERO', 'MARZO', 'ABRIL', 'MAYO', 'JUNIO', 
                 'JULIO', 'AGOSTO', 'SEPTIEMBRE', 'OCTUBRE', 'NOVIEMBRE', 'DICIEMBRE'];
  
  const procesadas = fechas.map(f => {
    const [year, month, day] = f.dia.split('-');
    return {
      diaNum: parseInt(day),
      mes: meses[parseInt(month) - 1],
      year: year,
      horarios: f.horarios || []
    };
  });
  
  const year = procesadas[0].year;
  const mes = procesadas[0].mes;
  
  // Si son del mismo mes
  const mismoMes = procesadas.every(p => p.mes === mes);
  
  let rangoTexto = '';
  if (mismoMes) {
    if (procesadas.length === 1) {
      rangoTexto = `${procesadas[0].diaNum} DE ${mes}`;
    } else {
      const dias = procesadas.map(p => p.diaNum);
      if (dias.length === 2) {
        rangoTexto = `${dias[0]} Y ${dias[1]} DE ${mes}`;
      } else {
        const ultimo = dias.pop();
        rangoTexto = `${dias.join(', ')} Y ${ultimo} DE ${mes}`;
      }
    }
  } else {
    // Diferentes meses
    rangoTexto = procesadas.map(p => `${p.diaNum} DE ${p.mes}`).join(' Y ');
  }
  
  // Detalles para mobile o lista completa
  const detalles = procesadas.map(p => ({
    fecha: `${p.diaNum} DE ${p.mes}`,
    hora: p.horarios[0]?.hora || '',
    desc: p.horarios[0]?.desc || ''
  }));
  
  return { 
    rango: rangoTexto, 
    year: year,
    detalles: detalles
  };
}
  if (!encuentroId) {
    document.getElementById('app').innerHTML = '<div class="loading">ERROR: ID NO ENCONTRADO</div>';
  } else {
    const API_URL = "https://script.google.com/macros/s/AKfycbxE-UiI85pCcUYq5LqJjN7UU7aOtXsVV_7Hyag-hYgOT4LcjGhVQaDt6js9PEQQ6E9Z/exec";
    
    fetch(`${API_URL}?action=getEncuentroById&id=${encuentroId}`)
      .then(res => res.json())
      .then(res => {
        if (!res.success || !res.data) throw new Error('Not found');
        
        const enc = res.data;
        const fechasData = formatDates(enc.fechasJSON);
        const year = fechasData.year || extractYear(enc.nombre, '');
        const nombreSinYear = enc.nombre.replace(/\s*20\d{2}\s*/, ' ').trim();
        
        // Parsear tipos
        const tipos = enc.tipo ? enc.tipo.split(',').map(t => t.trim()) : [];
        
        // Parsear precios
        let precios = [];
        try { precios = JSON.parse(enc.valoresJSON); } catch(e) {}

        document.getElementById('app').innerHTML = `
          <div class="flyer-wrapper">
            <!-- HERO SECTION -->
            <section class="hero-section">
              <div class="hero-bg">
                <img src="${enc.flyerUrl}" alt="Flyer" onerror="this.src='https://images.unsplash.com/photo-1489944440615-453fc2b6a9a9?w=1920&q=80'">
              </div>
              <div class="hero-overlay"></div>
              
              <!-- Bordes dorados curvos -->
              <div class="gold-border top"></div>
              <div class="gold-border bottom"></div>
              
              <div class="hero-content">
                <!-- HEADER -->
                <div class="hero-header">
                  <div class="logo-container">
                    <img src="https://i.ibb.co/gbRGZWyN/ARVET.png" alt="Logo" id="event-logo">
                  </div>
                  <div class="title-group">
                    <div class="edicion-tag">Edición: ${year}</div>
                    <h1 class="event-name">${nombreSinYear}</h1>
                  </div>
                </div>
                
                <!-- CENTER: Fechas -->
               
<div class="hero-center">
<div class="hero-content">
  <!-- HEADER -->
  <div class="hero-header">
    <div class="logo-container">
      <img src="https://i.ibb.co/gbRGZWyN/ARVET.png" alt="Logo" id="event-logo">
    </div>
    <div class="title-group">
      <div class="edicion-tag">Edición: ${year}</div>
      <h1 class="event-name">${nombreSinYear}</h1>
    </div>
  </div>
  
  <!-- CENTER: Fechas -->
  <div class="hero-center">
    <div class="date-range-desktop">
      <div class="date-main">${fechasData.rango}</div>
      <div class="year-sub">${fechasData.year}</div>
    </div>
    </div>
    <div class="date-range-mobile">
      ${fechasData.detalles.map(d => `
        <div class="date-detail-item">
          <span class="date-day">${d.fecha}</span>
          ${d.hora ? `<span class="date-time">${d.hora} HS ${d.desc ? `• ${d.desc.toUpperCase()}` : ''}</span>` : ''}
        </div>
      `).join('')}
    </div>
  
  
  <!-- BOTTOM: Lugar y Tags (ESTO FALTABA) -->
  <div class="hero-bottom">
    <div class="location-box">
      <div class="location-text">${enc.lugar || 'Lugar por confirmar'}</div>
    </div>
    
    <div class="tags-row">
      ${enc.cupoMaximo ? `<span class="tag cupo">${enc.cupoMaximo} Equipos</span>` : ''}
      ${tipos.map(t => `<span class="tag">${t}</span>`).join('')}
    </div>
  </div>
</div>
  <!-- Vista PC: Rango grande -->
  <div class="date-range-desktop">
    <div class="date-main">${fechasData.rango}</div>
    <div class="year-sub">${fechasData.year}</div>
  </div>
  
  <!-- Vista Mobile: Detalles individuales -->
  <div class="date-range-mobile">
    ${fechasData.detalles.map(d => `
      <div class="date-detail-item">
        <span class="date-day">${d.fecha}</span>
        ${d.hora ? `<span class="date-time">${d.hora} HS ${d.desc ? `• ${d.desc.toUpperCase()}` : ''}</span>` : ''}
      </div>
    `).join('')}
  </div>
</div>
              </div>
            </section>

            <!-- INFO SECTION -->
            <section class="info-section">
              <div class="info-container">
                ${enc.descripcion ? `
                <div class="info-block">
                  <h3 class="info-title">Sobre el Evento</h3>
                  <p class="description-text">${enc.descripcion}</p>
                </div>
                ` : ''}
                
                ${precios.length > 0 ? `
                <div class="info-block">
                  <h3 class="info-title">Inversión</h3>
                  <div class="pricing-row">
                    ${precios.map(p => `
                      <div class="price-item">
                        <div class="price-value">$${parseFloat(p.precio).toLocaleString('es-AR')}</div>
                        <div class="price-name">${p.titulo}</div>
                      </div>
                    `).join('')}
                  </div>
                </div>
                ` : ''}
              </div>
            </section>

            <!-- FOOTER -->
            <footer class="footer-section">
              <div class="org-info">Organiza: ${enc.creadorNombre || 'Organizador'}</div>
            </footer>
          </div>
        `;
      })
      .catch(err => {
        document.getElementById('app').innerHTML = '<div class="loading">EVENTO NO ENCONTRADO</div>';
      });
  }
</script>

</body>
</html>

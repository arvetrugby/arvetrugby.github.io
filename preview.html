<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>+ info de nuestro Encuentro de Rugby</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --blue-dark: #0a0f1a;
    --blue-mid: #141b2d;
    --blue-light: #1e2746;
    --white: #ffffff;
    --white-soft: rgba(255, 255, 255, 0.9);
    --white-muted: rgba(255, 255, 255, 0.6);
    --gold-soft: linear-gradient(135deg, #d4af37 0%, #f4e4ba 50%, #d4af37 100%);
    --gold-text: #e8d5a3;
    --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--blue-dark);
    color: var(--white);
    min-height: 100vh;
    line-height: 1.6;
  }

  .flyer-wrapper {
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HERO SECTION - PC: Imagen izquierda, datos derecha */
  .hero-section {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
  }

  .hero-image-container {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 100vh;
    overflow: hidden;
  }

  .hero-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.8) contrast(1.1);
    animation: imageReveal 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards;
    transform: scale(1.1);
  }

  @keyframes imageReveal {
    to {
      transform: scale(1);
    }
  }

  .image-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(10, 15, 26, 0.4) 100%);
    pointer-events: none;
  }

     .hero-content {
        padding: 40px 24px;
        margin-top: -20px;     /* ← MENOS NEGATIVO */
        position: relative;
        z-index: 10;
        background: linear-gradient(180deg, transparent 0%, var(--blue-dark) 80px); /* ← GRADIENTE PROPIO */
    }

  .hero-content::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 200%;
    background: radial-gradient(circle, rgba(212, 175, 55, 0.03) 0%, transparent 70%);
    animation: pulse 8s ease-in-out infinite;
}

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.1); opacity: 1; }
  }

  .content-inner {
    position: relative;
    z-index: 2;
    max-width: 600px;
    animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(30px);
  }

  @keyframes slideIn {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Logo */
  .logo-container {
    margin-bottom: 40px;
    animation: fadeIn 1s ease 0.3s forwards;
    opacity: 0;
  }

  .logo-container img {
    height: 80px;
    filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.3));
    transition: transform 0.3s ease;
  }

  .logo-container img:hover {
    transform: scale(1.05);
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Titles */
  .title-group {
    margin-bottom: 50px;
  }

  .edicion-tag {
    font-size: 0.85rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold-text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 500;
  }

  .edicion-tag::before {
    content: '';
    width: 40px;
    height: 1px;
    background: var(--gold-soft);
  }

  .event-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 4vw, 4rem);
    font-weight: 600;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--white) 0%, var(--white-muted) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }

  /* Date Section */
  .date-section {
    margin-bottom: 40px;
    padding: 30px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    backdrop-filter: blur(10px);
    transition: all 0.4s ease;
  }

  .date-section:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(212, 175, 55, 0.2);
    transform: translateY(-2px);
  }

  .date-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .date-icon {
    width: 24px;
    height: 24px;
    color: var(--gold-text);
  }

  .date-label {
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--white-muted);
    font-weight: 500;
  }

  .date-main {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 3vw, 2.5rem);
    font-weight: 500;
    color: var(--white);
    line-height: 1.3;
  }

  .year-display {
    display: inline-block;
    margin-top: 12px;
    padding: 8px 20px;
    background: var(--gold-soft);
    color: var(--blue-dark);
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 2px;
    border-radius: 30px;
  }

  /* Location */
  .location-section {
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 12px;
    border-left: 3px solid transparent;
    transition: all 0.3s ease;
  }

  .location-section:hover {
    background: rgba(255, 255, 255, 0.04);
    border-left-color: var(--gold-text);
    padding-left: 24px;
  }

  .location-icon {
    width: 22px;
    height: 22px;
    color: var(--gold-text);
    flex-shrink: 0;
  }

  .location-text {
    font-size: 1.1rem;
    color: var(--white-soft);
    font-weight: 400;
  }

  /* Tags */
  .tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 30px;
  }

  .tag {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 30px;
    font-size: 0.85rem;
    letter-spacing: 1px;
    color: var(--white-soft);
    transition: all 0.3s ease;
    cursor: default;
  }

  .tag:hover {
    background: rgba(212, 175, 55, 0.1);
    border-color: rgba(212, 175, 55, 0.3);
    transform: translateY(-2px);
  }

  .tag-icon {
    width: 16px;
    height: 16px;
    color: var(--gold-text);
  }

  /* Mobile Date Details */
  .date-details-mobile {
    display: none;
    margin-top: 20px;
    space-y: 12px;
  }

  .date-detail-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    transition: all 0.3s ease;
  }

  .date-detail-item:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(212, 175, 55, 0.2);
  }

  .detail-icon {
    width: 18px;
    height: 18px;
    color: var(--gold-text);
    flex-shrink: 0;
  }

  .detail-content {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .detail-date {
    font-weight: 500;
    color: var(--white);
    font-size: 0.95rem;
  }

  .detail-time {
    font-size: 0.85rem;
    color: var(--white-muted);
  }

  /* INFO SECTION */
  .info-section {
    background: var(--blue-dark);
    padding: 80px 40px;
    position: relative;
  }

  .info-section::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
  }

  .info-container {
    max-width: 1000px;
    margin: 0 auto;
  }

  .info-block {
    margin-bottom: 60px;
    animation: fadeInUp 0.8s ease forwards;
    opacity: 0;
    transform: translateY(20px);
  }

  .info-block:nth-child(2) { animation-delay: 0.2s; }

  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .info-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 500;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    color: var(--white);
  }

  .info-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(212, 175, 55, 0.5), transparent);
  }

  .description-text {
    font-size: 1.1rem;
    line-height: 1.8;
    color: var(--white-muted);
    max-width: 800px;
  }

  /* Pricing */
  .pricing-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 24px;
  }

  .price-item {
    position: relative;
    padding: 40px 30px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }

  .price-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--gold-soft);
    transform: scaleX(0);
    transition: transform 0.4s ease;
  }

  .price-item:hover {
    transform: translateY(-8px);
    border-color: rgba(212, 175, 55, 0.2);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
  }

  .price-item:hover::before {
    transform: scaleX(1);
  }

  .price-value {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    font-weight: 600;
    background: var(--gold-soft);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .price-name {
    font-size: 0.9rem;
    letter-spacing: 2px;
    color: var(--white-muted);
    text-transform: uppercase;
  }

  /* FOOTER */
  .footer-section {
    background: var(--blue-dark);
    padding: 40px;
    text-align: center;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
  }

  .org-info {
    font-size: 0.9rem;
    letter-spacing: 3px;
    color: var(--white-muted);
    text-transform: uppercase;
  }

  /* Loading */
  .loading {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--blue-dark);
    gap: 24px;
  }

  .loading-spinner {
    width: 50px;
    height: 50px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-top-color: var(--gold-text);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    color: var(--white-muted);
    letter-spacing: 4px;
    font-size: 0.9rem;
    text-transform: uppercase;
  }

  /* MOBILE */
  @media (max-width: 968px) {
    .hero-section {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;  /* ← IMAGEN ADAPTABLE */
        min-height: auto;
    }

   @media (max-width: 968px) {
    .hero-image-container {
        min-height: auto;
        height: auto;
        position: relative;
        display: flex;
        align-items: flex-start;
        background-color: var(--blue-dark); /* Fondo oscuro por si hay espacio */
    }
    
    .hero-image {
        position: relative;
        height: auto;
        width: 100%;
        object-fit: contain;
        object-position: top;
        display: block; /* Evita espacios raros */
    }
}

        .image-overlay {
        background: linear-gradient(180deg, transparent 60%, var(--blue-dark) 100%);
        height: 100%;         /* ← ASEGURAR QUE CUBRA */
    }

    @media (max-width: 968px) {
    .hero-content {
        padding: 40px 24px;
        margin-top: -20px;
        position: relative;
        z-index: 10;
        
        background: linear-gradient(180deg, transparent 0%, var(--blue-dark) 80px);
    }

    
    .hero-content::before {
        display: none; /* Opcional: ocultar el pulso dorado en mobile */
        /* O si lo querés mantener, dejarlo como está */
    }
}
    .content-inner {
      max-width: 100%;
    }

    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-container img {
      height: 60px;
    }

    .title-group {
      text-align: center;
      margin-bottom: 40px;
    }

    .edicion-tag {
      justify-content: center;
    }

    .edicion-tag::before {
      display: none;
    }

    .date-section {
      text-align: center;
      padding: 24px;
    }

    .date-header {
      justify-content: center;
    }

    .date-range-desktop {
      display: none;
    }

    .date-details-mobile {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .location-section {
      justify-content: center;
      text-align: center;
      flex-direction: column;
      gap: 12px;
    }

    .tags-container {
      justify-content: center;
    }

    .info-section {
      padding: 60px 24px;
    }

    .pricing-row {
      grid-template-columns: 1fr;
    }

    .price-item {
      max-width: 400px;
      margin: 0 auto;
      width: 100%;
    }
  }

  @media (max-width: 480px) {
    .event-name {
      font-size: 2rem;
    }

    .date-main {
      font-size: 1.5rem;
    }

    .hero-content {
      padding: 30px 20px;
    }
  }

  /* CTA EVENTO */
.evento-cta {
    max-width: 600px;
    margin: 0 auto 40px auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: center;
}

.evento-cta button {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
}

/* BOTON PRINCIPAL */
#btnParticipar {
    background: linear-gradient(135deg, #d4af37, #f4e4ba, #d4af37);
    color: #0a0f1a;
}

#btnParticipar:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(212, 175, 55, 0.3);
}

/* BOTON SECUNDARIO */
#btnVolver {
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.1);
}

#btnVolver:hover {
    background: rgba(255,255,255,0.1);
}

.evento-nota {
    margin-top: 10px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
}
</style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Cargando Evento</div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const encuentroId = params.get('id');

  function extractYear(nombre, fechaStr) {
    const matchNombre = nombre.match(/\b(20\d{2})\b/);
    if (matchNombre) return matchNombre[1];
    const matchFecha = fechaStr.match(/\b(20\d{2})\b/);
    if (matchFecha) return matchFecha[1];
    return new Date().getFullYear();
  }

  function formatDates(fechasJSON) {
    let fechas = [];
    try { fechas = JSON.parse(fechasJSON); } catch(e) {}
    
    if (fechas.length === 0) return { 
      rango: 'Fecha por confirmar', 
      year: '',
      detalles: []
    };
    
    const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                   'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
    
    const procesadas = fechas.map(f => {
      const [year, month, day] = f.dia.split('-');
      return {
        diaNum: parseInt(day),
        mes: meses[parseInt(month) - 1],
        year: year,
        horarios: f.horarios || []
      };
    });
    
    const year = procesadas[0].year;
    const mes = procesadas[0].mes;
    
    const mismoMes = procesadas.every(p => p.mes === mes);
    
    let rangoTexto = '';
    if (mismoMes) {
      if (procesadas.length === 1) {
        rangoTexto = `${procesadas[0].diaNum} de ${mes}`;
      } else {
        const dias = procesadas.map(p => p.diaNum);
        if (dias.length === 2) {
          rangoTexto = `${dias[0]} y ${dias[1]} de ${mes}`;
        } else {
          const ultimo = dias.pop();
          rangoTexto = `${dias.join(', ')} y ${ultimo} de ${mes}`;
        }
      }
    } else {
      rangoTexto = procesadas.map(p => `${p.diaNum} de ${p.mes}`).join(' y ');
    }
    
    const detalles = procesadas.map(p => ({
      fecha: `${p.diaNum} de ${p.mes}`,
      hora: p.horarios[0]?.hora || '',
      desc: p.horarios[0]?.desc || ''
    }));
    
    return { 
      rango: rangoTexto, 
      year: year,
      detalles: detalles
    };
  }

  // SVG Icons
  const icons = {
    calendar: `<svg class="date-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>`,
    location: `<svg class="location-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>`,
    users: `<svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>`,
    tag: `<svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>`,
    clock: `<svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`
  };

  if (!encuentroId) {
    document.getElementById('app').innerHTML = `
      <div class="loading">
        <div class="loading-text" style="color: #ef4444;">Error: ID no encontrado</div>
      </div>`;
  } else {
    const API_URL = "https://script.google.com/macros/s/AKfycbxE-UiI85pCcUYq5LqJjN7UU7aOtXsVV_7Hyag-hYgOT4LcjGhVQaDt6js9PEQQ6E9Z/exec";
    
    fetch(`${API_URL}?action=getEncuentroById&id=${encuentroId}`)
      .then(res => res.json())
      .then(res => {
        if (!res.success || !res.data) throw new Error('Not found');
        
        const enc = res.data;
        const fechasData = formatDates(enc.fechasJSON);
        const year = fechasData.year || extractYear(enc.nombre, '');
        const nombreSinYear = enc.nombre.replace(/\s*20\d{2}\s*/, ' ').trim();
        
        const tipos = enc.tipo ? enc.tipo.split(',').map(t => t.trim()) : [];
        
        let precios = [];
        try { precios = JSON.parse(enc.valoresJSON); } catch(e) {}

        document.getElementById('app').innerHTML = `
          <div class="flyer-wrapper">
            <section class="hero-section">
              <div class="hero-image-container">
                <img class="hero-image" src="${enc.flyerUrl}" alt="Flyer" onerror="this.src='https://images.unsplash.com/photo-1489944440615-453fc2b6a9a9?w=1920&q=80'">
                <div class="image-overlay"></div>
              </div>
              
              <div class="hero-content">
                <div class="content-inner">
                  <div class="logo-container">
                    <img src="https://i.ibb.co/gbRGZWyN/ARVET.png" alt="Logo" id="event-logo">
                  </div>
                  
                  <div class="title-group">
                    <div class="edicion-tag">Edición ${year}</div>
                    <h1 class="event-name">${nombreSinYear}</h1>
                  </div>
                  
                  <div class="date-section">
                    <div class="date-header">
                      ${icons.calendar}
                      <span class="date-label">Fecha del Evento</span>
                    </div>
                    
                    <div class="date-range-desktop">
                      <div class="date-main">${fechasData.rango}</div>
                      <div class="year-display">${fechasData.year}</div>
                    </div>
                    
                    <div class="date-details-mobile">
                      ${fechasData.detalles.map(d => `
                        <div class="date-detail-item">
                          ${icons.clock}
                          <div class="detail-content">
                            <span class="detail-date">${d.fecha}</span>
                            ${d.hora ? `<span class="detail-time">${d.hora} hs${d.desc ? ` • ${d.desc}` : ''}</span>` : ''}
                          </div>
                        </div>
                      `).join('')}
                    </div>
                  </div>
                  
                  <div class="location-section">
                    ${icons.location}
                    <span class="location-text">${enc.lugar || 'Lugar por confirmar'}</span>
                  </div>
                  
                  <div class="tags-container">
                    ${enc.cupoMaximo ? `
                      <div class="tag">
                        ${icons.users}
                        <span>${enc.cupoMaximo} Equipos</span>
                      </div>
                    ` : ''}
                    ${tipos.map(t => `
                      <div class="tag">
                        ${icons.tag}
                        <span>${t}</span>
                      </div>
                    `).join('')}
                  </div>
                </div>
              </div>
            </section>

            <section class="info-section">
              <div class="info-container">
                ${enc.descripcion ? `
                <div class="info-block">
                  <h3 class="info-title">Sobre el Evento</h3>
                  <p class="description-text">${enc.descripcion}</p>
                </div>
                ` : ''}
                
                ${precios.length > 0 ? `
                <div class="info-block">
                  <h3 class="info-title">Inversión</h3>
                  <div class="pricing-row">
                    ${precios.map(p => `
                      <div class="price-item">
                        <div class="price-value">$${parseFloat(p.precio).toLocaleString('es-AR')}</div>
                        <div class="price-name">${p.titulo}</div>
                      </div>
                    `).join('')}
                  </div>
                </div>
                ` : ''}
              </div>
            </section>

            <footer class="footer-section">
            <div class="evento-cta">
    <button id="btnParticipar">Participar</button>
    <button id="btnVolver">← Volver a ARVET</button>

    <p class="evento-nota">
        Para participar necesitás tener un equipo creado.<br>
        Si sos jugador, iniciá sesión o buscá tu equipo y registrate dentro del mismo.
    </p>
</div>
              <div class="org-info">Organiza: ${enc.creadorNombre || 'Organizador'}</div>
            </footer>
          </div>
        `;
      })
      .catch(err => {
        document.getElementById('app').innerHTML = `
          <div class="loading">
            <div class="loading-text" style="color: #ef4444;">Evento no encontrado</div>
          </div>`;
      });
  }


// ==========================
// BOTON VOLVER (FUNCIONA SI O SI)
// ==========================
document.addEventListener("click", function(e){
    if(e.target.id === "btnVolver"){

        const seccion = localStorage.getItem("arvet_last_section");

        if(seccion){
            window.location.href = `https://arvetrugby.github.io/Arvet/index.html#${seccion}`;
        } else {
            window.location.href = "https://arvetrugby.github.io/Arvet/index.html#partidos";
        }
    }
});


// ==========================
// BOTON PARTICIPAR (VA A ADMIN)
// ==========================
document.addEventListener("click", function(e){
    if(e.target.id === "btnParticipar"){
        window.location.href = "https://arvetrugby.github.io/Arvet/admin.html";
    }
});
</script>
</body>

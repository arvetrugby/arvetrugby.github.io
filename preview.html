<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyer Evento Rugby</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@300;400;500;600;700&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --cream: #f5f0e6;
  --cream-light: #faf8f3;
  --cream-dark: #d4c4a8;
  --gold-gradient: linear-gradient(135deg, #f5f0e6 0%, #ffffff 50%, #f5f0e6 100%);
  --neutral-dark: #1a1a1a;
  --neutral-mid: #2d2d2d;
}

body {
  font-family: 'Barlow Condensed', sans-serif;
  background: #050505;
  color: white;
  overflow-x: hidden;
}

/* CONTENEDOR PRINCIPAL */
.flyer-wrapper {
  width: 100%;
  min-height: 100vh;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* SECCION HERO */
.hero-section {
  position: relative;
  width: 100%;
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Background */
.hero-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.hero-bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.6) contrast(1.1);
}

/* Overlay */
.hero-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  background: 
    radial-gradient(ellipse at center top, transparent 0%, rgba(5,5,10,0.4) 50%, rgba(5,5,10,0.9) 100%),
    linear-gradient(to bottom, rgba(26,26,26,0.3) 0%, transparent 30%, transparent 60%, rgba(26,26,26,0.95) 100%);
}

/* Bordes curvos crema */
.cream-border {
  position: absolute;
  z-index: 2;
  pointer-events: none;
}

.cream-border.top {
  top: -100px;
  left: -10%;
  right: -10%;
  height: 300px;
  border-bottom: 2px solid var(--cream-dark);
  border-radius: 0 0 50% 50%;
  background: linear-gradient(to bottom, rgba(26,26,26,0.9), transparent);
  opacity: 0.8;
}

.cream-border.bottom {
  bottom: -100px;
  left: -10%;
  right: -10%;
  height: 300px;
  border-top: 2px solid var(--cream-dark);
  border-radius: 50% 50% 0 0;
  background: linear-gradient(to top, rgba(26,26,26,0.95), transparent);
  opacity: 0.8;
}

/* Contenido */
.hero-content {
  position: relative;
  z-index: 10;
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 60px 40px;
  justify-content: space-between;
  align-items: center;
  text-align: center;
}

/* Header */
.hero-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin-top: 40px;
}

.logo-container img {
  height: clamp(120px, 20vh, 200px);
  width: auto;
  filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
}

.title-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.edicion-tag {
  font-family: 'Teko', sans-serif;
  font-size: clamp(1rem, 2vw, 1.3rem);
  font-weight: 300;
  letter-spacing: 6px;
  color: var(--cream);
  text-transform: uppercase;
}

.event-name {
  font-family: 'Teko', sans-serif;
  font-size: clamp(2rem, 5vw, 4rem);
  font-weight: 600;
  line-height: 1;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: white;
  text-shadow: 0 4px 20px rgba(0,0,0,0.8);
}

/* Center - Fechas */
.hero-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  margin: auto 0;
}

.fecha-principal {
  font-family: 'Teko', sans-serif;
  font-size: clamp(2.5rem, 7vw, 5rem);
  font-weight: 700;
  line-height: 1;
  color: white;
  text-shadow: 0 4px 30px rgba(0,0,0,0.9);
  letter-spacing: 4px;
}

.hora-inicio {
  font-family: 'Teko', sans-serif;
  font-size: clamp(1.5rem, 3vw, 2.5rem);
  font-weight: 400;
  letter-spacing: 8px;
  background: var(--gold-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.tags-subtle {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-top: 20px;
  font-family: 'Teko', sans-serif;
  font-size: clamp(0.9rem, 1.5vw, 1.1rem);
  letter-spacing: 3px;
  color: var(--cream);
  text-transform: uppercase;
  opacity: 0.9;
}

/* Bottom - Lugar discreto */
.hero-bottom {
  margin-bottom: 40px;
}

.lugar-discreto {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: clamp(0.8rem, 1.2vw, 0.95rem);
  letter-spacing: 2px;
  color: var(--cream-dark);
  text-transform: uppercase;
  opacity: 0.8;
}

.lugar-discreto svg {
  width: 14px;
  height: 14px;
}

/* Info section */
.info-section {
  background: linear-gradient(to bottom, var(--neutral-dark), #050505);
  padding: 60px 20px;
}

.info-container {
  max-width: 900px;
  margin: 0 auto;
}

.info-block {
  margin-bottom: 50px;
}

.info-title {
  font-family: 'Teko', sans-serif;
  font-size: 1.5rem;
  font-weight: 500;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--cream);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 15px;
}

.info-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--cream-dark), transparent);
}

.description-text {
  font-size: 1.1rem;
  line-height: 1.8;
  color: rgba(255, 255, 255, 0.85);
  font-weight: 300;
}

/* Pricing */
.pricing-row {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.price-item {
  background: linear-gradient(135deg, rgba(245, 240, 230, 0.1), rgba(26, 26, 26, 0.5));
  border: 1px solid var(--cream-dark);
  border-radius: 12px;
  padding: 30px 40px;
  text-align: center;
  min-width: 200px;
  transition: all 0.3s ease;
}

.price-item:hover {
  transform: translateY(-5px);
  border-color: var(--cream);
  box-shadow: 0 10px 30px rgba(245, 240, 230, 0.1);
}

.price-value {
  font-family: 'Teko', sans-serif;
  font-size: 2.5rem;
  font-weight: 600;
  background: var(--gold-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}

.price-name {
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: rgba(255, 255, 255, 0.6);
  margin-top: 8px;
}

/* Footer */
.footer-section {
  background: #050505;
  border-top: 1px solid rgba(245, 240, 230, 0.2);
  padding: 30px 20px;
  text-align: center;
}

.org-info {
  font-size: 0.9rem;
  letter-spacing: 3px;
  color: rgba(255, 255, 255, 0.5);
  text-transform: uppercase;
}

/* Responsive */
@media (max-width: 768px) {
  .hero-content {
    padding: 40px 20px;
  }
  
  .hero-header {
    margin-top: 20px;
  }
  
  .logo-container img {
    height: 100px;
  }
  
  .cream-border.top,
  .cream-border.bottom {
    height: 200px;
  }
  
  .fecha-principal {
    font-size: clamp(2rem, 10vw, 3rem);
  }
  
  .hora-inicio {
    font-size: clamp(1.2rem, 5vw, 1.8rem);
    letter-spacing: 4px;
  }
}

/* Loading */
.loading {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--neutral-dark);
  color: var(--cream);
  font-family: 'Teko', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 5px;
}

  </style>
</head>
<body>

<div id="app">
  <div class="loading">CARGANDO EVENTO...</div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const encuentroId = params.get('id');

  // Extraer año del nombre o usar fecha
  function extractYear(nombre, fechaStr) {
    // Buscar año en el nombre (ej: "Encuentro 2027")
    const matchNombre = nombre.match(/\b(20\d{2})\b/);
    if (matchNombre) return matchNombre[1];
    
    // Buscar en fechas
    const matchFecha = fechaStr.match(/\b(20\d{2})\b/);
    if (matchFecha) return matchFecha[1];
    
    return new Date().getFullYear();
  }

  // Reemplazá la función formatDates por esta:

function formatDates(fechasJSON) {
  let fechas = [];
  try { fechas = JSON.parse(fechasJSON); } catch(e) {}
  
  if (fechas.length === 0) return { 
    rango: 'FECHA POR CONFIRMAR', 
    year: '',
    detalles: []
  };
  
  const meses = ['ENERO', 'FEBRERO', 'MARZO', 'ABRIL', 'MAYO', 'JUNIO', 
                 'JULIO', 'AGOSTO', 'SEPTIEMBRE', 'OCTUBRE', 'NOVIEMBRE', 'DICIEMBRE'];
  
  const procesadas = fechas.map(f => {
    const [year, month, day] = f.dia.split('-');
    return {
      diaNum: parseInt(day),
      mes: meses[parseInt(month) - 1],
      year: year,
      horarios: f.horarios || []
    };
  });
  
  const year = procesadas[0].year;
  const mes = procesadas[0].mes;
  
  // Si son del mismo mes
  const mismoMes = procesadas.every(p => p.mes === mes);
  
  let rangoTexto = '';
  if (mismoMes) {
    if (procesadas.length === 1) {
      rangoTexto = `${procesadas[0].diaNum} DE ${mes}`;
    } else {
      const dias = procesadas.map(p => p.diaNum);
      if (dias.length === 2) {
        rangoTexto = `${dias[0]} Y ${dias[1]} DE ${mes}`;
      } else {
        const ultimo = dias.pop();
        rangoTexto = `${dias.join(', ')} Y ${ultimo} DE ${mes}`;
      }
    }
  } else {
    // Diferentes meses
    rangoTexto = procesadas.map(p => `${p.diaNum} DE ${p.mes}`).join(' Y ');
  }
  
  // Detalles para mobile o lista completa
  const detalles = procesadas.map(p => ({
    fecha: `${p.diaNum} DE ${p.mes}`,
    hora: p.horarios[0]?.hora || '',
    desc: p.horarios[0]?.desc || ''
  }));
  
  return { 
    rango: rangoTexto, 
    year: year,
    detalles: detalles
  };
}
  if (!encuentroId) {
    document.getElementById('app').innerHTML = '<div class="loading">ERROR: ID NO ENCONTRADO</div>';
  } else {
    const API_URL = "https://script.google.com/macros/s/AKfycbxE-UiI85pCcUYq5LqJjN7UU7aOtXsVV_7Hyag-hYgOT4LcjGhVQaDt6js9PEQQ6E9Z/exec";
    
    fetch(`${API_URL}?action=getEncuentroById&id=${encuentroId}`)
      .then(res => res.json())
      .then(res => {
        if (!res.success || !res.data) throw new Error('Not found');
        
        const enc = res.data;
        const fechasData = formatDates(enc.fechasJSON);
        const year = fechasData.year || extractYear(enc.nombre, '');
        const nombreSinYear = enc.nombre.replace(/\s*20\d{2}\s*/, ' ').trim();
        
        // Parsear tipos
        const tipos = enc.tipo ? enc.tipo.split(',').map(t => t.trim()) : [];
        
        // Parsear precios
        let precios = [];
        try { precios = JSON.parse(enc.valoresJSON); } catch(e) {}

document.getElementById('app').innerHTML = `
  <div class="flyer-wrapper">
    <section class="hero-section">
      <div class="hero-bg">
        <img src="${enc.flyerUrl}" alt="Flyer" onerror="this.src='https://images.unsplash.com/photo-1489944440615-453fc2b6a9a9?w=1920&q=80'">
      </div>
      <div class="hero-overlay"></div>
      
      <div class="cream-border top"></div>
      <div class="cream-border bottom"></div>
      
      <div class="hero-content">
        <!-- HEADER -->
        <div class="hero-header">
          <div class="logo-container">
            <img src="https://i.ibb.co/gbRGZWyN/ARVET.png" alt="Logo">
          </div>
          <div class="title-group">
            <div class="edicion-tag">Edición ${year}</div>
            <h1 class="event-name">${nombreSinYear}</h1>
          </div>
        </div>
        
        <!-- CENTER: Fecha principal + hora -->
        <div class="hero-center">
          <div class="fecha-principal">${fechasData.rango}</div>
          ${fechasData.detalles[0]?.hora ? `<div class="hora-inicio">${fechasData.detalles[0].hora} HS</div>` : ''}
          
          <!-- Tags discretos -->
          <div class="tags-subtle">
            ${enc.cupoMaximo ? `<span>${enc.cupoMaximo} Equipos</span>` : ''}
            ${tipos.length > 0 ? `<span>•</span><span>${tipos.join(' • ')}</span>` : ''}
          </div>
        </div>
        
        <!-- BOTTOM: Lugar discreto -->
        <div class="hero-bottom">
          <div class="lugar-discreto">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            ${enc.lugar || 'Lugar por confirmar'}
          </div>
        </div>
      </div>
    </section>

    <!-- INFO SECTION -->
    <section class="info-section">
      <div class="info-container">
        ${enc.descripcion ? `
        <div class="info-block">
          <h3 class="info-title">Sobre el Evento</h3>
          <p class="description-text">${enc.descripcion}</p>
        </div>
        ` : ''}
        
        ${precios.length > 0 ? `
        <div class="info-block">
          <h3 class="info-title">Inversión</h3>
          <div class="pricing-row">
            ${precios.map(p => `
              <div class="price-item">
                <div class="price-value">$${parseFloat(p.precio).toLocaleString('es-AR')}</div>
                <div class="price-name">${p.titulo}</div>
              </div>
            `).join('')}
          </div>
        </div>
        ` : ''}
      </div>
    </section>

    <footer class="footer-section">
      <div class="org-info">Organiza: ${enc.creadorNombre || 'Organizador'}</div>
    </footer>
  </div>
`;
      })
      .catch(err => {
        document.getElementById('app').innerHTML = '<div class="loading">EVENTO NO ENCONTRADO</div>';
      });
  }
</script>

</body>
</html>
